<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Smart Deadline</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-theme dashboard-bg">
    <div class="glass-container">
        <header class="glass" style="padding: 1rem 2rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <div class="logo">
                <i data-lucide="shield-check"></i>
                <span>Admin Master Dashboard</span>
            </div>
            <div style="display: flex; gap: 1rem;">
                <h4 id="total-users-val" style="margin-right: 15px;">Users: 0</h4>
                <h4 id="total-tasks-val">Tasks: 0</h4>
                <a href="index.html" class="secondary-btn" style="text-decoration: none; margin-left: 20px;">Back to App</a>
            </div>
        </header>

        <main class="card glass">
            <h3>All Registered Users & Tasks</h3>
            <div id="admin-content">
                <p>Loading database records...</p>
            </div>
        </main>
    </div>
    <script src="admin-script.js"></script>
</body>
</html>
