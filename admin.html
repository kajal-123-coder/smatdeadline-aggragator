<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Smart Deadline</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .admin-table th { background: rgba(138,43,226,0.3); color: #a855f7; padding: 12px 15px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 2px solid rgba(168,85,247,0.3); }
        .admin-table td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-main); font-size: 0.9rem; vertical-align: top; }
        .admin-table tr:hover td { background: rgba(255,255,255,0.03); }
        .priority-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .priority-High { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid #ef4444; }
        .priority-Medium { background: rgba(249,115,22,0.2); color: #f97316; border: 1px solid #f97316; }
        .priority-Low { background: rgba(34,197,94,0.2); color: #22c55e; border: 1px solid #22c55e; }
        .task-pill { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 10px; margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
        .stats-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 120px; background: rgba(138,43,226,0.15); border: 1px solid rgba(138,43,226,0.3); border-radius: 14px; padding: 1.2rem; text-align: center; }
        .stat-card .num { font-size: 2rem; font-weight: 800; color: #a855f7; }
        .stat-card .lbl { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }
        .time-info { font-size: 0.8rem; color: var(--text-dim); }
        .online-badge { background: rgba(34,197,94,0.2); color: #22c55e; border: 1px solid #22c55e; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
        .search-bar { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 0.75rem 1.25rem; border-radius: 10px; color: white; font-size: 0.9rem; width: 300px; outline: none; }
        .search-bar:focus { border-color: #a855f7; }
        .filter-btn { background: rgba(138,43,226,0.2); border: 1px solid rgba(138,43,226,0.4); color: #a855f7; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .filter-btn.active, .filter-btn:hover { background: rgba(138,43,226,0.4); }
    </style>
</head>
<body class="dark-theme dashboard-bg">
    <div class="glass-container" style="padding: 2rem;">
        <header class="glass" style="padding: 1.25rem 2rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <div class="logo">
                <i data-lucide="shield-check"></i>
                <span>Admin Master Dashboard</span>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <span id="last-updated" style="color: var(--text-dim); font-size: 0.8rem;"></span>
                <button onclick="loadData()" class="primary-btn sm">
                    <i data-lucide="refresh-cw" style="width:16px;"></i> Refresh
                </button>
                <a href="admin-priority.html" class="secondary-btn" style="text-decoration: none;">Priority View</a>
                <a href="index.html" class="secondary-btn" style="text-decoration: none;">Back to App</a>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-card">
                <div class="num" id="stat-users">0</div>
                <div class="lbl">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-tasks">0</div>
                <div class="lbl">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-high" style="color:#ef4444;">0</div>
                <div class="lbl">High Priority</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-medium" style="color:#f97316;">0</div>
                <div class="lbl">Medium Priority</div>
            </div>
            <div class="stat-card">
                <div class="num" id="stat-low" style="color:#22c55e;">0</div>
                <div class="lbl">Low Priority</div>
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="glass" style="padding: 1rem 1.5rem; margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
            <input type="text" id="search-input" class="search-bar" placeholder="🔍 Search user or task...">
            <div style="display: flex; gap: 0.5rem;">
                <button class="filter-btn active" onclick="filterPriority('all', this)">All</button>
                <button class="filter-btn" onclick="filterPriority('High', this)">🔴 High</button>
                <button class="filter-btn" onclick="filterPriority('Medium', this)">🟠 Medium</button>
                <button class="filter-btn" onclick="filterPriority('Low', this)">🟢 Low</button>
            </div>
        </div>

        <!-- Main Table -->
        <div class="card glass" style="overflow-x: auto;">
            <div id="admin-content">
                <p style="text-align:center; padding: 2rem; color: var(--text-dim);">Loading data...</p>
            </div>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
