<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Priority View | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-theme dashboard-bg">
    <div class="glass-container">
        <header class="glass" style="padding: 1rem 2rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <div class="logo">
                <i data-lucide="layout-grid"></i>
                <span>Tasks by Priority</span>
            </div>
            <div style="display: flex; gap: 1rem;">
                <a href="admin.html" class="secondary-btn" style="text-decoration: none;">User View</a>
                <a href="index.html" class="secondary-btn" style="text-decoration: none;">Back to App</a>
            </div>
        </header>

        <main class="card glass">
            <h3>Global Task Priority Matrix</h3>
            <div id="priority-content">
                <p>Analyzing priorities...</p>
            </div>
        </main>
    </div>
    <script src="admin-priority-script.js"></script>
</body>
</html>
